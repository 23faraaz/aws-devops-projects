<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 560px;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 20px;
    }
    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>The page you requested could not be found.</p>
    <a href="/">Return to homepage</a>
  </div>
</body>
</html>
